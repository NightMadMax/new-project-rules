name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Verify immutable action pins
        run: python3 scripts/check-action-pins.py
      - name: Lint shell scripts
        run: |
          for f in scripts/*.sh; do
            echo "sh -n $f"
            sh -n "$f"
          done
      - name: Bootstrap regression test
        run: sh scripts/test-bootstrap.sh
      - name: Project contract parity test
        run: sh scripts/test-contract.sh
      - name: Validator regression test
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          python3 scripts/test-validator.py
          python3 scripts/test-agent-sync.py
          python3 scripts/test-migration-planner.py
          python3 scripts/test-supply-chain.py
          python3 scripts/test-standardize-existing-project.py
          python3 scripts/test-compress-project.py
      - name: Validator report
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          python3 scripts/validate-project.py --root . --kind rules --report-only
          python3 scripts/sync_global_agents.py --check --report-only
          python3 scripts/plan_migration.py --plan --target global --report-only
      - name: Agent setup smoke test
        run: sh scripts/test-agent-setup.sh
      - name: Agent skill contract test
        run: sh scripts/test-skills.sh

  powershell:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Verify immutable action pins
        shell: powershell
        run: python .\scripts\check-action-pins.py
      - name: Parse-check PowerShell scripts with Windows PowerShell 5.1
        shell: powershell
        run: .\scripts\test-powershell-syntax.ps1
      - name: Parse-check PowerShell scripts with PowerShell 7
        shell: pwsh
        run: .\scripts\test-powershell-syntax.ps1
      - name: Validator regression test on Windows
        shell: powershell
        run: |
          $env:PYTHONDONTWRITEBYTECODE = "1"
          python .\scripts\test-validator.py
          python .\scripts\test-agent-sync.py
          python .\scripts\test-migration-planner.py
          python .\scripts\test-supply-chain.py
          python .\scripts\test-standardize-existing-project.py
          python .\scripts\test-compress-project.py
      - name: Validator report on Windows
        shell: powershell
        run: |
          $env:PYTHONDONTWRITEBYTECODE = "1"
          python .\scripts\validate-project.py --root . --kind rules --report-only
          python .\scripts\sync_global_agents.py --check --report-only
          python .\scripts\plan_migration.py --plan --target global --report-only
      - name: Bootstrap regression test with Windows PowerShell 5.1
        shell: powershell
        run: .\scripts\test-bootstrap.ps1
      - name: Project contract parity test with Windows PowerShell 5.1
        shell: powershell
        run: .\scripts\test-contract.ps1
      - name: Agent setup smoke test with Windows PowerShell 5.1
        shell: powershell
        run: .\scripts\test-agent-setup.ps1
      - name: Agent skill contract test with Windows PowerShell 5.1
        shell: powershell
        run: .\scripts\test-skills.ps1
      - name: Bootstrap regression test with PowerShell 7
        shell: pwsh
        run: .\scripts\test-bootstrap.ps1
      - name: Project contract parity test with PowerShell 7
        shell: pwsh
        run: .\scripts\test-contract.ps1
      - name: Agent setup smoke test with PowerShell 7
        shell: pwsh
        run: .\scripts\test-agent-setup.ps1
      - name: Agent skill contract test with PowerShell 7
        shell: pwsh
        run: .\scripts\test-skills.ps1
      - name: PowerShell test environment isolation
        shell: powershell
        run: .\scripts\test-powershell-environment.ps1
